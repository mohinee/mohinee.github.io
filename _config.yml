title: Mohinee Indurkar
tagline: Senior software engineer · AI agents, full-stack, React
description: >-
  Notes from 14 years of building software — currently architecting AI agents
  on Microsoft Teams. Writing about LLMs in production, frontend craft, and
  the parts of software I find worth thinking about.
author: Mohinee Indurkar
email: mohineet@gmail.com

# Update these once you create the GitHub repo
url: "https://mohinee.github.io"
baseurl: ""

github_username: mohinee
linkedin_username: mohinee

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:title/

# Posts shown on home page
paginate: 10

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
